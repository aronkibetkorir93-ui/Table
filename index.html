<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EFL Season 1 | Official Standings</title>
    <style>
        :root { --gold: #d4af37; --navy: #020617; --white: #ffffff; --row-alt: rgba(255, 255, 255, 0.03); }
        
        * { box-sizing: border-box; }
        body, html { margin: 0; padding: 0; background: #000; color: #fff; font-family: 'Arial Black', sans-serif; height: 100%; overflow-x: hidden; }

        /* Background and Container */
        .main-container {
            background: linear-gradient(180deg, #0f172a 0%, #020617 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 10px;
        }

        /* Header Styling */
        header { text-align: center; padding: 10px 0; }
        .league-title { color: var(--gold); font-size: 1.5rem; margin: 5px 0; text-transform: uppercase; letter-spacing: 1px; }
        .season-tag { font-size: 0.8rem; letter-spacing: 4px; opacity: 0.7; margin-top: -5px; }

        /* Awards Row */
        .awards { display: flex; gap: 8px; margin: 15px 0; }
        .award-card { 
            flex: 1; border: 1px solid var(--gold); border-radius: 6px; padding: 8px; 
            background: rgba(212, 175, 55, 0.08); text-align: center;
        }
        .award-label { font-size: 0.6rem; color: var(--gold); display: block; margin-bottom: 2px; }
        .award-val { font-size: 0.8rem; font-weight: bold; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* REAL EPL TABLE STYLING */
        .table-section {
            flex-grow: 1; /* Fills the remaining space */
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--gold);
            border-radius: 8px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .table-header {
            background: var(--gold);
            color: #000;
            display: flex;
            font-weight: 900;
            font-size: 0.7rem;
            padding: 12px 0;
            text-transform: uppercase;
        }

        .table-body { flex-grow: 1; overflow-y: auto; }

        .t-row {
            display: flex;
            align-items: center;
            border-bottom: 1px solid rgba(212, 175, 55, 0.2);
            padding: 14px 0;
            font-size: 0.85rem;
        }
        .t-row:nth-child(even) { background: var(--row-alt); }

        /* Perfect Column Ratios */
        .col-pos { width: 10%; text-align: center; font-weight: 900; }
        .col-name { width: 35%; text-align: left; padding-left: 10px; border-left: 1px solid rgba(212, 175, 55, 0.2); text-transform: uppercase; }
        .col-s { width: 7%; text-align: center; border-left: 1px solid rgba(212, 175, 55, 0.1); font-size: 0.75rem; }
        .col-pts { 
            width: 11%; text-align: center; font-weight: 900; color: var(--gold); 
            border-left: 2px solid var(--gold); background: rgba(212, 175, 55, 0.1); 
        }

        /* Fixtures & Admin */
        .admin-zone { text-align: center; padding: 20px 0; }
        .btn-gold { background: var(--gold); border: none; padding: 12px 25px; font-weight: 900; border-radius: 4px; cursor: pointer; }
        .fixtures { background: #050b18; padding: 15px; border-top: 2px solid var(--gold); }
        .match { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #1e293b; font-size: 0.8rem; }
        .match input { width: 35px; background: #000; color: var(--gold); border: 1px solid var(--gold); text-align: center; font-weight: bold; }
        .hidden { display: none; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body>

    <div id="captureArea" class="main-container">
        <header>
            <h1 class="league-title">ELITE FOOTBALL LEAGUE</h1>
            <div class="season-tag">SEASON 1 STANDINGS</div>
        </header>

        <div class="awards">
            <div class="award-card">
                <span class="award-label">🔥 GOLDEN BOOT</span>
                <div id="topScorer" class="award-val">---</div>
            </div>
            <div class="award-card">
                <span class="award-label">🛡️ GOLDEN GLOVE</span>
                <div id="bestDefense" class="award-val">---</div>
            </div>
        </div>

        <section class="table-section">
            <div class="table-header">
                <div class="col-pos">#</div>
                <div class="col-name">PLAYER</div>
                <div class="col-s">P</div>
                <div class="col-s">W</div>
                <div class="col-s">D</div>
                <div class="col-s">L</div>
                <div class="col-s">GD</div>
                <div class="col-pts">PTS</div>
            </div>
            <div id="tableContent" class="table-body">
                </div>
        </section>
    </div>

    <div class="admin-zone">
        <button class="btn-gold" onclick="downloadTable()">SAVE AS IMAGE</button>
        <p onclick="unlockAdmin()" style="font-size: 0.6rem; color: #475569; margin-top: 15px; cursor: pointer;">ADMIN LOGIN</p>
    </div>

    <section id="fixtureSection" class="fixtures">
        <h2 style="color:var(--gold); font-size: 1rem;">RESULTS INPUT</h2>
        <div id="fixtureList"></div>
        <button id="saveBtn" class="btn-gold hidden" style="width:100%; margin-top:10px;" onclick="saveData()">PUBLISH RESULTS</button>
    </section>

    <script>
        const players = ["KIBET ARON", "BRALYN KIPKIRUI", "MANU KHEED", "LINO", "HOLYPLUG", "MANU JOSH", "BLAMEK", "IAN TOO"];
        let fixtures = [
            { r: 1, p1: "KIBET ARON", p2: "IAN TOO", s1: null, s2: null },
            { r: 1, p1: "BRALYN KIPKIRUI", p2: "BLAMEK", s1: null, s2: null },
            { r: 1, p1: "MANU KHEED", p2: "MANU JOSH", s1: null, s2: null },
            { r: 1, p1: "LINO", p2: "HOLYPLUG", s1: null, s2: null },
            { r: 2, p1: "IAN TOO", p2: "HOLYPLUG", s1: null, s2: null },
            { r: 2, p1: "MANU JOSH", p2: "LINO", s1: null, s2: null },
            { r: 2, p1: "BLAMEK", p2: "MANU KHEED", s1: null, s2: null },
            { r: 2, p1: "KIBET ARON", p2: "BRALYN KIPKIRUI", s1: null, s2: null }
        ];

        let isAdmin = false;

        function unlockAdmin() {
            if (prompt("ADMIN KEY:") === "EliteAdmin2026") {
                isAdmin = true;
                document.getElementById('saveBtn').classList.remove('hidden');
                renderFixtures();
            }
        }

        function renderFixtures() {
            const list = document.getElementById('fixtureList');
            list.innerHTML = '';
            fixtures.forEach((f, i) => {
                list.innerHTML += `
                    <div class="match">
                        <span style="width:38%; text-align:right">${f.p1}</span>
                        <div style="display:flex; gap:5px;">
                            <input type="number" value="${f.s1!==null?f.s1:''}" ${!isAdmin?'readonly':''} onchange="updateScore(${i},'s1',this.value)">
                            <input type="number" value="${f.s2!==null?f.s2:''}" ${!isAdmin?'readonly':''} onchange="updateScore(${i},'s2',this.value)">
                        </div>
                        <span style="width:38%">${f.p2}</span>
                    </div>`;
            });
        }

        function updateScore(idx, key, val) {
            fixtures[idx][key] = val === "" ? null : parseInt(val);
            calculateTable();
        }

        function calculateTable() {
            let stats = {};
            players.forEach(p => stats[p] = { p:0, w:0, d:0, l:0, gf:0, ga:0, gd:0, pts:0 });
            
            fixtures.forEach(f => {
                if (f.s1 !== null && f.s2 !== null) {
                    stats[f.p1].p++; stats[f.p2].p++;
                    stats[f.p1].gf += f.s1; stats[f.p1].ga += f.s2;
                    stats[f.p2].gf += f.s2; stats[f.p2].ga += f.s1;
                    if (f.s1 > f.s2) { stats[f.p1].w++; stats[f.p1].pts += 3; stats[f.p2].l++; }
                    else if (f.s1 < f.s2) { stats[f.p2].w++; stats[f.p2].pts += 3; stats[f.p1].l++; }
                    else { stats[f.p1].d++; stats[f.p2].d++; stats[f.p1].pts += 1; stats[f.p2].pts += 1; }
                    stats[f.p1].gd = stats[f.p1].gf - stats[f.p1].ga;
                    stats[f.p2].gd = stats[f.p2].gf - stats[f.p2].ga;
                }
            });

            const sorted = Object.entries(stats).sort((a,b) => b[1].pts - a[1].pts || b[1].gd - a[1].gd);
            
            // Awards calculation
            const ts = Object.entries(stats).sort((a,b) => b[1].gf - a[1].gf)[0];
            const bd = Object.entries(stats).filter(x => x[1].p > 0).sort((a,b) => a[1].ga - b[1].ga)[0];
            document.getElementById('topScorer').innerText = ts[1].gf > 0 ? `${ts[0]} (${ts[1].gf})` : "---";
            document.getElementById('bestDefense').innerText = bd ? `${bd[0]} (${bd[1].ga} GA)` : "---";

            const content = document.getElementById('tableContent');
            content.innerHTML = '';
            sorted.forEach((item, i) => {
                const [name, s] = item;
                content.innerHTML += `
                    <div class="t-row">
                        <div class="col-pos">${i+1}</div>
                        <div class="col-name">${name}</div>
                        <div class="col-s">${s.p}</div>
                        <div class="col-s">${s.w}</div>
                        <div class="col-s">${s.d}</div>
                        <div class="col-s">${s.l}</div>
                        <div class="col-s">${s.gd}</div>
                        <div class="col-pts">${s.pts}</div>
                    </div>`;
            });
        }

        function downloadTable() {
            const area = document.getElementById('captureArea');
            html2canvas(area, { backgroundColor: "#020617" }).then(canvas => {
                let link = document.createElement('a');
                link.download = 'EFL_Standings.png';
                link.href = canvas.toDataURL();
                link.click();
            });
        }

        function saveData() {
            localStorage.setItem('efl_final_locked', JSON.stringify(fixtures));
            alert("STANDINGS PUBLISHED!");
        }

        const local = localStorage.getItem('efl_final_locked');
        if (local) fixtures = JSON.parse(local);
        renderFixtures();
        calculateTable();
    </script>
</body>
</html>
