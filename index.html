<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EFL Season 1 Portal</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body>
    <div id="captureArea" class="main-bg">
        <header class="league-header">
            <img src="1000059186.png" alt="EFL Logo" class="main-logo">
            <h1 class="gold-text">ELITE FOOTBALL LEAGUE</h1>
            <p class="season-text">SEASON 1</p>
        </header>

        <div class="awards-row">
            <div class="award-box">
                <span class="label">🔥 TOP SCORER</span>
                <div id="topScorer" class="val">---</div>
            </div>
            <div class="award-box">
                <span class="label">🛡️ BEST DEFENCE</span>
                <div id="bestDefense" class="val">---</div>
            </div>
        </div>

        <section class="standings-container">
            <div class="grid-row header">
                <div class="c-pos">POS</div>
                <div class="c-name">PLAYER NAME</div>
                <div class="c-s">P</div>
                <div class="c-s">W</div>
                <div class="c-s">D</div>
                <div class="c-s">L</div>
                <div class="c-s">GF</div>
                <div class="c-s">GA</div>
                <div class="c-s">GD</div>
                <div class="c-pts">Pts</div>
            </div>
            <div id="tableBody"></div>
        </section>

        <div class="footer-graphic">
            <img src="https://cdn-icons-png.flaticon.com/512/53/53254.png" class="ball">
        </div>
    </div>

    <div class="admin-panel">
        <button onclick="downloadTable()" class="btn-gold">Download PNG</button>
        <button onclick="unlockAdmin()" class="btn-link">Admin Login</button>
    </div>

    <section class="fixtures-section">
        <h2 class="gold-text">FIXTURES</h2>
        <div id="fixtureContainer"></div>
        <button id="saveBtn" class="hidden" onclick="saveData()">SAVE CHANGES</button>
    </section>

    <script src="script.js"></script>
</body>
</html>
