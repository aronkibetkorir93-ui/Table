<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EFL Season 1 | Official Standings</title>
    <style>
        :root { --gold: #d4af37; --navy: #020617; }
        * { box-sizing: border-box; }
        body, html { 
            margin: 0; padding: 0; background: #000; color: #fff; 
            font-family: 'Arial Narrow', sans-serif; min-height: 100vh;
        }

        .main-wrapper {
            background: linear-gradient(180deg, #0f172a 0%, #020617 100%);
            display: flex;
            flex-direction: column;
            padding: 5px;
        }

        /* Area to be captured as Image */
        #captureArea { 
            background: #020617;
            padding: 15px 5px;
            display: flex;
            flex-direction: column;
            min-height: 80vh; /* Stretches to fill vertical space */
        }

        header { text-align: center; margin-bottom: 10px; }
        .league-title { color: var(--gold); font-size: 1.5rem; margin: 0; font-weight: 900; letter-spacing: 1px; }

        .awards { display: flex; gap: 5px; margin-bottom: 15px; padding: 0 5px; }
        .award-card { 
            flex: 1; border: 1px solid var(--gold); padding: 8px; 
            text-align: center; background: rgba(212,175,55,0.05); border-radius: 4px;
        }
        .award-label { font-size: 0.6rem; color: var(--gold); display: block; font-weight: bold; }
        .award-val { font-size: 0.75rem; font-weight: bold; }

        /* THE TABLE - PRO EPL STYLE */
        .table-container {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            border: 1px solid var(--gold);
            background: rgba(0,0,0,0.4);
            border-radius: 4px;
            overflow: hidden;
        }

        .t-header {
            background: var(--gold);
            color: #000;
            display: flex;
            font-weight: 900;
            font-size: 0.65rem;
            padding: 12px 0;
            text-align: center;
        }

        .t-row {
            display: flex;
            border-bottom: 1px solid rgba(212, 175, 55, 0.2);
            padding: 16px 0; /* Tall rows to fill space */
            font-size: 0.8rem;
            align-items: center;
        }

        /* TIGHT COLUMN WIDTHS TO FIT ALL 10 STATS */
        .col-pos { width: 8%; text-align: center; font-weight: 900; }
        .col-name { 
            width: 28%; text-align: left; padding-left: 5px;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
            text-transform: uppercase; font-weight: bold;
        }
        .col-s { width: 8%; text-align: center; border-left: 1px solid rgba(212,175,55,0.1); font-size: 0.7rem; }
        .col-pts { 
            width: 10%; text-align: center; font-weight: 900; 
            color: var(--gold); background: rgba(212, 175, 55, 0.15); 
            border-left: 1px solid var(--gold);
        }

        /* ADMIN & INPUT AREA */
        .admin-controls { padding: 25px 10px; text-align: center; background: #000; }
        .btn-gold { background: var(--gold); border: none; padding: 12px 25px; font-weight: 900; border-radius: 4px; cursor: pointer; text-transform: uppercase; }

        .fixture-zone { padding: 20px; background: #0a101f; border-top: 3px solid var(--gold); }
        .match-row { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 12px 0; border-bottom: 1px solid #1e293b; font-size: 0.75rem;
        }
        .match-row input { 
            width: 35px; background: #000; color: var(--gold); 
            border: 1px solid var(--gold); text-align: center; font-weight: bold;
        }
        .hidden { display: none; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body>

    <div class="main-wrapper">
        <div id="captureArea">
            <header>
                <h1 class="league-title">ELITE FOOTBALL LEAGUE</h1>
                <div style="font-size:0.6rem; letter-spacing:4px; opacity:0.6">SEASON 1 STANDINGS</div>
            </header>

            <div class="awards">
                <div class="award-card">
                    <span class="award-label">🔥 TOP SCORER</span>
                    <div id="topScorer" class="award-val">---</div>
                </div>
                <div class="award-card">
                    <span class="award-label">🛡️ BEST DEFENCE</span>
                    <div id="bestDefense" class="award-val">---</div>
                </div>
            </div>

            <div class="table-container">
                <div class="t-header">
                    <div class="col-pos">#</div>
                    <div class="col-name">PLAYER</div>
                    <div class="col-s">P</div><div class="col-s">W</div><div class="col-s">D</div><div class="col-s">L</div>
                    <div class="col-s">GF</div><div class="col-s">GA</div><div class="col-s">GD</div>
                    <div class="col-pts">PTS</div>
                </div>
                <div id="tableBody"></div>
            </div>
        </div>

        <div class="admin-controls">
            <button class="btn-gold" onclick="downloadTable()">Download Image</button>
            <p onclick="unlockAdmin()" style="font-size: 0.7rem; color: #475569; margin-top: 20px; cursor: pointer;">ADMIN LOGIN TO ENTER SCORES</p>
        </div>

        <section id="adminSection" class="fixture-zone hidden">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 20px;">
                <h2 style="color:var(--gold); margin:0; font-size: 1rem;">UPDATE SCORES</h2>
                <button onclick="saveData()" class="btn-gold" style="padding: 5px 15px;">SAVE</button>
            </div>
            <div id="fixtureList"></div>
        </section>
    </div>

    <script src="script.js"></script>
</body>
</html>
