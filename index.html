<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EFL | Season 1</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body>
    <div id="captureArea" class="main-bg">
        <header class="league-header">
            <img src="" alt="Logo" class="main-logo">
            <h1 class="league-title">ELITE FOOTBALL LEAGUE</h1>
            <p class="season-label">SEASON 1</p>
        </header>

        <div class="awards-container">
            <div class="award-box">
                <span class="award-icon">🔥 TOP SCORER</span>
                <div id="topScorer" class="award-value">---</div>
            </div>
            <div class="award-box">
                <span class="award-icon">🛡️ BEST DEFENCE</span>
                <div id="bestDefense" class="award-value">---</div>
            </div>
        </div>

        <section class="table-section">
            <div class="table-header-row">
                <span class="col-pos">POS</span>
                <span class="col-name">PLAYER NAME</span>
                <span class="col-s">P</span>
                <span class="col-s">W</span>
                <span class="col-s">D</span>
                <span class="col-s">L</span>
                <span class="col-s">GF</span>
                <span class="col-s">GA</span>
                <span class="col-s">GD</span>
                <span class="col-pts">Pts</span>
            </div>
            <div id="tableBody" class="table-rows">
                </div>
        </section>
        
        <div class="footer-ball">
            <img src="https://cdn-icons-png.flaticon.com/512/53/53254.png" alt="ball" class="ball-img">
        </div>
    </div>

    <div class="admin-controls">
        <button id="downloadBtn" onclick="downloadTable()">Download Standings</button>
        <button id="adminToggle" onclick="unlockAdmin()">Admin Login</button>
    </div>

    <section class="fixtures-card">
        <h2 class="section-title">FIXTURES & RESULTS</h2>
        <div id="fixtureContainer"></div>
        <button id="saveBtn" class="hidden" onclick="saveData()">SAVE & UPDATE STANDINGS</button>
    </section>

    <script src="script.js"></script>
</body>
</html>
